<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeff Buckley: Login</title>
    <link rel="stylesheet" href="/css/style_login-screen.css">
    <script src="https://kit.fontawesome.com/f2a03832e0.js" crossorigin="anonymous"></script>
</head>

<body>
    <h1>Jeff Buckley</h1>
    <div class="container">
        <form>
            <h2>Login</h2>
            <div class="anm">
                <i class="fa-solid fa-user"></i>
                <input id="us" class="campo" type="email" required placeholder=" ">
                <label class="plc" for="us">User</label>
            </div>

            <div class="anm">
                <i class="fa-solid fa-lock"></i>
                <input id="ps" class="campo" type="password" required placeholder=" ">
                <label class="plc" for="ps">Password</label>
            </div>

            <div class="remember-forgot">
                <label>
                    <input class="ck" type="checkbox">Remember Me
                </label>
                <a href="#">Forgot Password</a>
            </div>

            <button type="submit">Enter</button>

            <div class="reg">
                <p>Don't have an account? <a href="#">Register</a></p>
            </div>
        </form>
    </div>

</body>

</html>
